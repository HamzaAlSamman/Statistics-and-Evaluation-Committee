<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <link rel="icon" type="image/png" href="./Logo/icon.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;900&display=swap');

        body {
            background: #f5eedc;
            padding: 40px 20px;
            font-family: 'Cairo', sans-serif;
            color: #3d0e2d;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ── Photos grid ── */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .photo-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(113, 17, 42, 0.08);
            border: 1px solid rgba(113, 17, 42, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(113, 17, 42, 0.15);
        }

        .photo-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .actions {
            padding: 16px;
            display: flex;
            gap: 12px;
        }

        .btn-approve {
            flex: 1;
            background: linear-gradient(135deg, #16A34A, #15803d);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-weight: 900;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .btn-approve:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-reject {
            flex: 1;
            background: linear-gradient(135deg, #c51a1b, #71112a);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-weight: 900;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .btn-reject:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #64748b;
            font-weight: bold;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .btn-back {
            background: #71112a;
            color: #f5eedc;
            padding: 8px 16px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background: #3d0e2d;
        }

        /* ── Section heading ── */
        .panel-heading {
            font-size: 16px;
            font-weight: 900;
            color: #3d0e2d;
            margin: 0 0 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(113, 17, 42, .12);
        }

        .panel-sub {
            font-size: 13px;
            color: #64748b;
            font-weight: 700;
            margin-bottom: 18px;
        }
    </style>
</head>

<body>
    <div class="admin-container">

        <div class="header-bar">
            <h1 style="font-size:24px;margin:0;font-weight:900;">لوحة التحكم</h1>
            <a href="index.html" class="btn-back">العودة للموقع</a>
        </div>

        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="admin-tab-btn active" data-tab="photos">📸 صور الزوار</button>
            <button class="admin-tab-btn" data-tab="books">📚 كتب الزوار</button>
        </div>

        <!-- ═══════════════════════════ PHOTOS TAB ═══════════════════════════ -->
        <div id="tab-photos" class="admin-tab-panel active">
            <div id="pendingList" class="photo-grid">
                <div class="empty-state">جاري تحميل الصور المعلقة...</div>
            </div>
        </div>

        <!-- ═══════════════════════════ BOOKS TAB ════════════════════════════ -->
        <div id="tab-books" class="admin-tab-panel">

            <!-- Pending -->
            <p class="panel-heading">الكتب قيد المراجعة</p>
            <p class="panel-sub">الكتب التالية في قائمة الانتظار — وافق عليها لتظهر في السحابة، أو ارفضها لحذفها.</p>
            <div id="booksPendingList">
                <div class="empty-state">جاري التحميل...</div>
            </div>

            <!-- Divider -->
            <hr style="margin:32px 0;border:none;border-top:2px solid rgba(113,17,42,.1);">

            <!-- Approved -->
            <p class="panel-heading">الكتب المعتمدة (ظاهرة في السحابة)</p>
            <div id="booksApprovedSection">
                <div class="empty-state">جاري التحميل...</div>
            </div>
        </div>

    </div>

    <script>
        const API = "http://localhost:3000";

        /* ══════════════════════════════
           TAB SWITCHING
        ══════════════════════════════ */
        document.querySelectorAll('.admin-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.admin-tab-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
                if (btn.dataset.tab === 'books') { loadBooksPending(); loadBooksApproved(); }
            });
        });

        /* ══════════════════════════════
           PHOTOS
        ══════════════════════════════ */
        async function loadPending() {
            const container = document.getElementById('pendingList');
            try {
                const response = await fetch(`${API}/pending`);
                const photos = await response.json();
                if (photos.length === 0) {
                    container.innerHTML = '<div class="empty-state">لا توجد صور معلقة حالياً.</div>';
                    return;
                }
                container.innerHTML = photos.map(photo => `
          <div class="photo-card" id="card-${photo}">
            <img src="${API}/temp/${photo}" alt="Pending Photo">
            <div class="actions">
              <button class="btn-approve" onclick="approvePhoto('${photo}')">موافقة</button>
              <button class="btn-reject"  onclick="rejectPhoto('${photo}')">حذف</button>
            </div>
          </div>
        `).join('');
            } catch {
                container.innerHTML = '<div class="empty-state" style="color:#c51a1b">تعذر الاتصال بالسيرفر. تأكد من تشغيل server.js</div>';
            }
        }

        async function approvePhoto(filename) {
            if (!confirm('هل أنت متأكد من الموافقة على هذه الصورة؟')) return;
            const res = await fetch(`${API}/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename })
            });
            let data = {}; try { data = await res.json(); } catch { }
            if (!res.ok) { alert(data.message || `فشل (HTTP ${res.status})`); return; }
            document.getElementById(`card-${filename}`)?.remove();
        }

        async function rejectPhoto(filename) {
            if (!confirm('هل أنت متأكد من حذف هذه الصورة؟')) return;
            const res = await fetch(`${API}/reject`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename })
            });
            let data = {}; try { data = await res.json(); } catch { }
            if (!res.ok) { alert(data.message || `فشل (HTTP ${res.status})`); return; }
            document.getElementById(`card-${filename}`)?.remove();
        }

        /* ══════════════════════════════
           BOOKS — PENDING
        ══════════════════════════════ */
        async function loadBooksPending() {
            const el = document.getElementById('booksPendingList');
            try {
                const res = await fetch(`${API}/books/pending`);
                const list = await res.json();
                if (!list.length) {
                    el.innerHTML = '<div class="empty-state">لا توجد كتب معلقة حالياً.</div>';
                    return;
                }
                el.innerHTML = list.map(entry => {
                    const date = new Date(entry.submittedAt).toLocaleString('ar-SY');
                    return `
            <div class="book-row" id="brow-${entry.id}">
              <div class="book-row-title">${escHtml(entry.title)}</div>
              <span class="book-row-meta">${date}</span>
              <div class="book-row-actions">
                <button class="btn-approve" style="padding:8px 20px;font-size:13px;" onclick="approveBook('${entry.id}')">موافقة</button>
                <button class="btn-reject"  style="padding:8px 20px;font-size:13px;" onclick="rejectBook('${entry.id}')">رفض</button>
              </div>
            </div>`;
                }).join('');
            } catch {
                el.innerHTML = '<div class="empty-state" style="color:#c51a1b">تعذر الاتصال بالسيرفر.</div>';
            }
        }

        async function approveBook(id) {
            const res = await fetch(`${API}/books/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            let data = {}; try { data = await res.json(); } catch { }
            if (!res.ok) { alert(data.message || `فشل`); return; }
            document.getElementById(`brow-${id}`)?.remove();
            loadBooksApproved();
        }

        async function rejectBook(id) {
            if (!confirm('هل أنت متأكد من رفض هذا الكتاب وحذفه؟')) return;
            const res = await fetch(`${API}/books/reject`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            let data = {}; try { data = await res.json(); } catch { }
            if (!res.ok) { alert(data.message || `فشل`); return; }
            document.getElementById(`brow-${id}`)?.remove();
        }

        /* ══════════════════════════════
           BOOKS — APPROVED
        ══════════════════════════════ */
        async function loadBooksApproved() {
            const el = document.getElementById('booksApprovedSection');
            try {
                const res = await fetch(`${API}/books/approved`);
                const list = await res.json();
                if (!list.length) {
                    el.innerHTML = '<div class="empty-state">لا توجد كتب معتمدة بعد.</div>';
                    return;
                }
                const sorted = [...list].sort((a, b) => b.count - a.count);
                el.innerHTML = `
          <table class="approved-table">
            <thead>
              <tr><th>عنوان الكتاب</th><th style="text-align:center">عدد الإشارات</th></tr>
            </thead>
            <tbody>
              ${sorted.map(b => `
                <tr>
                  <td>${escHtml(b.title)}</td>
                  <td style="text-align:center"><span class="count-badge">${b.count}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>`;
            } catch {
                el.innerHTML = '<div class="empty-state" style="color:#c51a1b">تعذر الاتصال بالسيرفر.</div>';
            }
        }

        /* ══════════════════════════════
           HELPERS
        ══════════════════════════════ */
        function escHtml(str) {
            return str.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        /* ══════════════════════════════
           INIT
        ══════════════════════════════ */
        window.onload = loadPending;
    </script>
</body>

</html>
