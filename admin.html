<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - مراجعة الصور</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;900&display=swap');

        body {
            background: #f5eedc;
            /* cream */
            padding: 40px 20px;
            font-family: 'Cairo', sans-serif;
            color: #3d0e2d;
            /* darkMaroon */
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .photo-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(113, 17, 42, 0.08);
            /* brand shadow */
            border: 1px solid rgba(113, 17, 42, 0.15);
            /* brand border */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(113, 17, 42, 0.15);
        }

        .photo-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .actions {
            padding: 16px;
            display: flex;
            gap: 12px;
        }

        .btn-approve {
            flex: 1;
            background: linear-gradient(135deg, #16A34A, #15803d);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .btn-approve:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-reject {
            flex: 1;
            background: linear-gradient(135deg, #c51a1b, #71112a);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .btn-reject:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #64748b;
            font-weight: bold;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-back {
            background: #71112a;
            color: #f5eedc;
            padding: 8px 16px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background: #3d0e2d;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div class="header-bar">
            <h1 class="text-2xl font-black" style="font-size: 24px; margin: 0; font-weight: 900;">لوحة التحكم: مراجعة
                صور الزوار</h1>
            <a href="index.html" class="btn-back">العودة للموقع</a>
        </div>

        <div id="pendingList" class="photo-grid">
            <!-- الصور المعلقة ستظهر هنا -->
            <div class="empty-state">جاري تحميل الصور المعلقة...</div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:3000";

        async function loadPending() {
            const container = document.getElementById('pendingList');
            try {
                const response = await fetch(`${API_BASE}/pending`);
                const photos = await response.json();

                if (photos.length === 0) {
                    container.innerHTML = '<div class="empty-state">لا توجد صور معلقة حالياً.</div>';
                    return;
                }

                container.innerHTML = photos.map(photo => `
          <div class="photo-card" id="card-${photo}">
            <img src="${API_BASE}/temp/${photo}" alt="Pending Photo">
            <div class="actions">
              <button class="btn-approve" onclick="approvePhoto('${photo}')">موافقة</button>
              <button class="btn-reject" onclick="rejectPhoto('${photo}')">حذف</button>
            </div>
          </div>
        `).join('');
            } catch (error) {
                container.innerHTML = '<div class="empty-state text-rose-600">تعذر الاتصال بالسيرفر. تأكد من تشغيل server.js</div>';
            }
        }

        async function approvePhoto(filename) {
  if (!confirm('هل أنت متأكد من الموافقة على هذه الصورة ونشرها؟')) return;

  const res = await fetch(`${API_BASE}/approve`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename })
  });

  let data = {};
  try { data = await res.json(); } catch {}

  if (!res.ok) {
    alert(data.message || `فشل الموافقة (HTTP ${res.status})`);
    return;
  }

  document.getElementById(`card-${filename}`)?.remove();
}

       async function rejectPhoto(filename) {
  if (!confirm('هل أنت متأكد من حذف هذه الصورة؟')) return;

  const res = await fetch(`${API_BASE}/reject`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename })
  });

  let data = {};
  try { data = await res.json(); } catch {}

  if (!res.ok) {
    alert(data.message || `فشل الحذف (HTTP ${res.status})`);
    return;
  }

  document.getElementById(`card-${filename}`)?.remove();
}

        window.onload = loadPending;
    </script>
</body>

</html>
